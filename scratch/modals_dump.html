  <!-- ABSENCE MODAL -->
  <div id="absenceModal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center">
    <div style="background:var(--card); width:100%; max-width:500px; border-radius:20px; padding:24px; border:1px solid var(--border)">
      <h3 style="margin-bottom:16px">📅 Lançar Falta (Assiduidade)</h3>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px">
        <div><label class="flabel">Funcionário</label><select id="absenceEmp"></select></div>
        <div><label class="flabel">Data</label><input type="date" id="absenceDate"/></div>
      </div>
      <div style="margin-bottom:20px"><label class="flabel">Motivo (Opcional)</label><input id="absenceReason" placeholder="Justificativa..."/></div>
      <button class="blue btn-full" onclick="addAbsence()" style="margin-bottom:20px">➕ Registrar Falta</button>
      
      <div class="title" style="font-size:12px; border-top:1px solid var(--border); padding-top:16px; margin-top:16px">Faltas no período filtrado:</div>
      <div id="absenceList" style="max-height:200px; overflow-y:auto; margin-bottom:20px"></div>
      
      <div style="display:flex; justify-content:flex-end">
        <button class="sec" onclick="document.getElementById('absenceModal').style.display='none'">Fechar</button>
      </div>
    </div>
  </div>

  <!-- BULK EDIT MODAL -->
  <div id="bulkEditModal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center">
    <div style="background:var(--card); width:100%; max-width:450px; border-radius:20px; padding:24px; border:1px solid var(--border)">
      <h3 style="margin-bottom:16px">✏️ Editar Venda Agranel</h3>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px">
        <div><label class="flabel">Data</label><input type="date" id="editBulkDate"/></div>
        <div><label class="flabel">NF</label><input id="editBulkInvoice" placeholder="000..."/></div>
      </div>
      <div style="margin-bottom:12px"><label class="flabel">Cliente / Comprador</label><input id="editBulkCustomer"/></div>
      <div id="editBulkSigArea" style="margin-bottom:12px; display:none">
        <label class="flabel">Assinatura do Comprador</label>
        <img id="editBulkSigImg" src="" style="width:100%; height:80px; background:#f8fafc; border:1px solid var(--border); border-radius:10px; object-fit:contain"/>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px">
        <div><label class="flabel">Peso (Kg)</label><input type="number" id="editBulkWeight"/></div>
        <div><label class="flabel">Valor Total (R$)</label><input type="number" id="editBulkValue"/></div>
      </div>
      <div style="display:flex; gap:10px; justify-content:flex-end">
        <button class="sec" onclick="document.getElementById('bulkEditModal').style.display='none'">Cancelar</button>
        <button onclick="saveBulkEdit()" style="background:var(--blue); font-weight:800">Salvar Alterações</button>
      </div>
    </div>
  </div>

  <!-- SIGNATURE MODAL -->
  <div id="sigModal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center">
    <div style="background:var(--card); width:400px; padding:20px; border-radius:15px; border:1px solid var(--border)">
      <h3 style="margin-bottom:10px">✍️ Assinatura Digital</h3>
      <p style="font-size:12px; color:var(--muted); margin-bottom:15px">Esta ordem só pode ser impressa após a assinatura do responsável do Packing House.</p>
      <div style="background:#fff; border-radius:8px; overflow:hidden; border:2px solid #ccc; margin-bottom:15px;">
        <canvas id="sigCanvas" width="360" height="150" style="touch-action:none; display:block; width:100%; cursor:crosshair"></canvas>
      </div>
      <div style="display:flex; gap:10px; justify-content:flex-end">
        <button class="sec" onclick="document.getElementById('sigModal').style.display='none'">Cancelar</button>
        <button class="danger" onclick="clearSig()">Limpar</button>
        <button onclick="saveSig()">Salvar Assinatura</button>
      </div>
    </div>
  </div>
  
  <!-- EMPLOYEE EDIT MODAL -->
  <div id="empModal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:#1e293b; padding:24px; border-radius:12px; width:450px; max-width:95%; border:1px solid var(--border);">
      <h3 style="margin-top:0; color:#fff; margin-bottom:20px">✏️ Editar Funcionário</h3>
      <input type="hidden" id="editEmpId">
      <div style="margin-bottom:12px"><label class="flabel">Barcode</label><input id="editEmpBarcode"/></div>
      <div style="margin-bottom:12px"><label class="flabel">Nome</label><input id="editEmpName"/></div>
      <div style="margin-bottom:12px"><label class="flabel">Função</label>
        <select id="editEmpRole">
          <option value="EMBALADOR">Embalador(a)</option>
          <option value="EMPILHADOR">Empilhador(a)</option>
          <option value="COLHEDOR">Colhedor(a)</option>
          <option value="TRATORISTA">Tratorista</option>
          <option value="SUPERVISOR">Supervisor(a)</option>
        </select>
      </div>
      <div style="margin-bottom:12px"><label class="flabel">WhatsApp</label><input id="editEmpWhatsapp" placeholder="55..."/></div>
      <div style="margin-bottom:20px">
        <label class="flabel">Foto do Colaborador</label>
        <input type="file" id="editEmpPhotoFile" accept="image/*" style="display:none" onchange="$('editEmpPhotoBtn').textContent='✅ Nova Foto Selecionada'">
        <button id="editEmpPhotoBtn" onclick="$('editEmpPhotoFile').click()" style="width:100%; padding:11px; background:rgba(59,130,246,0.1); color:var(--blue); border:1px dashed var(--blue); border-radius:10px; font-size:12px; font-weight:700">📷 TROCAR FOTO</button>
        <input type="hidden" id="editEmpPhotoUrl">
      </div>
      <div style="display:flex; gap:10px; justify-content:flex-end">
        <button class="sec" onclick="document.getElementById('empModal').style.display='none'">Cancelar</button>
        <button onclick="saveEmpEdit(event)" style="background:var(--blue); font-weight:800">Salvar Alterações</button>      </div>
    </div>
  </div>
